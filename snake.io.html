<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake.io Arena - 完整功能修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI 圖層 */
        #ui-layer { position: absolute; top: 20px; right: 20px; color: #eee; background: rgba(20,20,20,0.9); padding: 15px; border-radius: 12px; font-size: 14px; border: 1px solid #444; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; }
        #score-ui { position: absolute; bottom: 20px; left: 20px; color: #0f4; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,68,0.5); pointer-events: none; }
        #permanent-rank { position: absolute; top: 20px; left: 20px; color: #eee; background: rgba(20,20,20,0.9); padding: 15px; border-radius: 12px; font-size: 13px; border: 1px solid #444; width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* 選單 */
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        .input-box { margin-bottom: 25px; text-align: center; }
        #player-name-input { background: transparent; border: 2px solid #333; border-radius: 8px; padding: 10px 20px; color: #0f4; font-size: 20px; text-align: center; outline: none; transition: 0.3s; }
        #player-name-input:focus { border-color: #0f4; box-shadow: 0 0 15px rgba(0,255,68,0.3); }
        
        .btn-group { display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        .mode-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 160px; transition: 0.3s; cursor: pointer; }
        .mode-card:hover { border-color: #0f4; background: rgba(0,255,68,0.05); transform: translateY(-5px); }
        .mode-card.active { border-color: #0f4; background: rgba(0,255,68,0.1); }

        #start-btn { font-size: 22px; padding: 12px 60px; cursor: pointer; background: #0f4; border: none; color: #000; border-radius: 50px; font-weight: bold; transition: 0.3s; margin-top: 30px; }
        #start-btn:hover { box-shadow: 0 0 30px #0f4; transform: scale(1.05); }

        h1 { font-size: 50px; margin: 0; letter-spacing: 3px; text-shadow: 0 0 20px #0f4; }
        .mode-desc { color: #777; margin-top: 10px; font-size: 12px; min-height: 35px; }
        .hint { color: #555; font-size: 12px; margin-top: 15px; }
        hr { border: 0; border-top: 1px solid #333; margin: 10px 0; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color:#0f4">SNAKE.IO <span style="color:white">ARENA</span></h1>
    <p style="color:#888">模式專屬排行榜 | AI 競技對決</p>

    <div class="input-box" style="margin-top: 30px;">
        <p style="color: #888; margin-bottom: 10px;">ENTER YOUR NAME</p>
        <input type="text" id="player-name-input" placeholder="GUEST" maxlength="12">
    </div>

    <div class="btn-group">
        <div class="mode-card" id="card-evo" onclick="selectMode('evo', 3000)">
            <b style="color: #0f4;">練習：覺醒</b>
            <p class="mode-desc">磁力 3,000<br>AI_BOT 挑戰賽</p>
            <p style="color:#666; font-size: 11px; margin-top:5px;">磁力 3000</p>
        </div>
        <div class="mode-card" id="card-classic" onclick="selectMode('classic', 300)">
            <b style="color: #fff;">練習：經典</b>
            <p class="mode-desc">磁力 300<br>純技術對決</p>
            <p style="color:#666; font-size: 11px; margin-top:5px;">磁力 300</p>
        </div>
        <div class="mode-card" id="card-online" onclick="selectMode('online', 300)">
            <b style="color: #0af;">連機：對戰</b>
            <p class="mode-desc">磁力 300<br>全球排名賽 (模擬)</p>
            <p style="color:#666; font-size: 11px; margin-top:5px;">全球模擬</p>
        </div>
    </div>
    <button id="start-btn" onclick="startGame()">START GAME</button>
    <p class="hint">遊戲中按 [ESC] 可隨時退出並紀錄成績</p>
</div>

<div id="permanent-rank">
    <div id="rank-title" style="font-weight:bold; color:#0f4; margin-bottom:10px;">🏆 RANKING</div>
    <div id="p-list"></div>
</div>

<div id="ui-layer"></div>
<div id="score-ui">SCORE: 0</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 遊戲環境常數
const MAP = 3000;      // 地圖邊界大小 (-MAP 到 MAP)
const FOOD_MAX = 400;  // 基本食物總數
const AI_COUNT = 25;   // 戰場 AI 數量

let started = false;
let currentMode = 'evo';
let currentMagnetLimit = 3000;
let camera = { x: 0, y: 0, zoom: 1 };
let foods = [], ai_bots = [], toDie = [];
let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, down: false };
let playerName = "GUEST";
let player;

// --- 排行榜儲存 ---
function selectMode(mode, magnet) {
    currentMode = mode;
    currentMagnetLimit = magnet;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    const targetCard = document.getElementById(`card-${mode}`);
    if (targetCard) targetCard.classList.add('active');
    updatePermanentUI();
}

function updatePermanentUI() {
    const title = document.getElementById('rank-title');
    title.innerText = `🏆 ${currentMode.toUpperCase()} 紀錄`;
    let storageKey = `snake_rank_v4_${currentMode}`;
    let records = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const list = document.getElementById('p-list');
    if(records.length === 0) { 
        list.innerHTML = "<div style='color:#555'>尚無紀錄</div>"; 
        return; 
    }
    list.innerHTML = records.map((r, i) => 
        `<div style="margin:5px 0">${i+1}. <span style="color:#888">${r.name}</span> <span style="float:right;color:#0f4;font-weight:bold">${r.score}</span></div>`
    ).join('');
}

function saveRecord(score) {
    if (score < 200) return; // 分數太低不紀錄
    let storageKey = `snake_rank_v4_${currentMode}`;
    let records = JSON.parse(localStorage.getItem(storageKey) || '[]');
    
    records.push({ 
        score: Math.floor(score), 
        name: playerName,
        date: new Date().toLocaleDateString() 
    });
    
    records.sort((a, b) => b.score - a.score);
    localStorage.setItem(storageKey, JSON.stringify(records.slice(0, 5)));
    updatePermanentUI();
}

// --- 核心類別 ---
class Snake {
    constructor(x, y, color, isPlayer = false, startLen = 150) {
        this.body = [];
        this.length = startLen;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = 4.5;
        this.angle = Math.random() * Math.PI * 2;
        this.dead = false;
        
        this.name = isPlayer ? playerName : (currentMode === 'online' ? "PLAYER_" + Math.floor(Math.random()*999) : "AI_BOT_" + Math.floor(Math.random()*999));

        // 初始化身體節點
        for (let i = 0; i < this.length; i += 5) {
            this.body.push({ x: x - i * Math.cos(this.angle), y: y - i * Math.sin(this.angle) });
        }
    }

    getWidth() { 
        return Math.min(60, 12 + Math.sqrt(this.length) * 0.5); 
    }

    update() {
        if (this.dead) return;

        // 衝刺加速機制
        let currentSpeed = this.speed;
        if (this.isPlayer && mouse.down && this.length > 100) {
            currentSpeed *= 1.8;
            if (Math.random() > 0.6) {
                this.length -= 2; // 加速消耗長度
                if (Math.random() > 0.5) {
                    spawnFood(this.body[this.body.length - 1].x, this.body[this.body.length - 1].y, false, this.color);
                }
            }
        }

        // 移動蛇頭
        let head = {
            x: this.body[0].x + Math.cos(this.angle) * currentSpeed,
            y: this.body[0].y + Math.sin(this.angle) * currentSpeed
        };
        this.body.unshift(head);

        // 控制蛇的長度平衡
        let targetSegmentCount = Math.max(5, Math.floor(this.length / 5));
        while (this.body.length > targetSegmentCount) {
            this.body.pop();
        }
    }

    draw() {
        if (this.body.length === 0) return;
        ctx.save();
        let width = this.getWidth();

        // 繪製身體
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = this.color;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(this.body[0].x, this.body[0].y);
        for (let i = 1; i < this.body.length; i++) {
            ctx.lineTo(this.body[i].x, this.body[i].y);
        }
        ctx.stroke();

        // 繪製眼睛（蛇頭部）
        let head = this.body[0];
        ctx.fillStyle = "#fff";
        let eyeOffsetAngle = 0.5;
        let eyeDist = width * 0.3;
        
        let eye1X = head.x + Math.cos(this.angle + eyeOffsetAngle) * eyeDist;
        let eye1Y = head.y + Math.sin(this.angle + eyeOffsetAngle) * eyeDist;
        let eye2X = head.x + Math.cos(this.angle - eyeOffsetAngle) * eyeDist;
        let eye2Y = head.y + Math.sin(this.angle - eyeOffsetAngle) * eyeDist;
        
        ctx.beginPath(); ctx.arc(eye1X, eye1Y, width * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(eye2X, eye2Y, width * 0.15, 0, Math.PI * 2); ctx.fill();

        // 繪製名字
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(this.name, head.x, head.y - width - 5);
        ctx.restore();
    }
}

function initGame() {
    foods = []; ai_bots = []; toDie = [];
    player = new Snake(0, 0, "#0f4", true);
    for(let i=0; i<FOOD_MAX; i++) spawnFood();
    for(let i=0; i<AI_COUNT; i++) spawnAI();
}

function spawnFood(x, y, big = false, color = null) {
    foods.push({
        x: x ?? (Math.random() - 0.5) * MAP * 2,
        y: y ?? (Math.random() - 0.5) * MAP * 2,
        size: big ? Math.random() * 6 + 6 : Math.random() * 3 + 2,
        color: color ?? `hsl(${Math.random() * 360}, 100%, 65%)`,
    });
}

function spawnAI() {
    let startLen = 150;
    if (player && player.length > 5000) startLen = player.length * (0.3 + Math.random()*0.4);
    ai_bots.push(new Snake((Math.random()-0.5)*MAP*2, (Math.random()-0.5)*MAP*2, `hsl(${Math.random()*360}, 75%, 60%)`, false, startLen));
}

// 全局單一主循環
function loop() {
    requestAnimationFrame(loop);
    if (!started) return; // 如果沒開始，就只是空轉，避免多重疊加問題

    // 清空與重繪畫布
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 視角（Camera）平滑跟隨玩家
    camera.x += (player.body[0].x - camera.x) * 0.1;
    camera.y += (player.body[0].y - camera.y) * 0.1;
    
    // 動態縮放（長度越長，鏡頭拉越遠）
    let targetZoom = Math.max(0.4, 1.5 - (player.getWidth() / 50));
    camera.zoom += (targetZoom - camera.zoom) * 0.05;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(camera.zoom, camera.zoom);
    ctx.translate(-camera.x, -camera.y);

    // 繪製地圖網格與邊界線
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    for(let x = -MAP; x <= MAP; x += 100) {
        ctx.beginPath(); ctx.moveTo(x, -MAP); ctx.lineTo(x, MAP); ctx.stroke();
    }
    for(let y = -MAP; y <= MAP; y += 100) {
        ctx.beginPath(); ctx.moveTo(-MAP, y); ctx.lineTo(MAP, y); ctx.stroke();
    }
    ctx.strokeStyle = "#f00"; ctx.lineWidth = 5;
    ctx.strokeRect(-MAP, -MAP, MAP*2, MAP*2);

    // 玩家操控角度計算
    let dx = mouse.x - canvas.width / 2;
    let dy = mouse.y - canvas.height / 2;
    player.angle = Math.atan2(dy, dx);

    let magnetRange = Math.min(currentMagnetLimit, 10 * player.length);

    // 食物與玩家磁力吸收處理
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        let fdx = player.body[0].x - f.x, fdy = player.body[0].y - f.y;
        let dist = Math.sqrt(fdx*fdx + fdy*fdy);

        // 磁力吸入效果
        if (dist < magnetRange) {
            f.x += (fdx / (dist || 1)) * 8;
            f.y += (fdy / (dist || 1)) * 8;
        }

        // 吃掉食物
        if (dist < player.getWidth() * 0.6) {
            player.length += f.size * 1.5;
            foods.splice(i, 1);
            spawnFood();
        } else {
            // 繪製食物
            ctx.fillStyle = f.color;
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // 更新玩家狀態與邊界碰撞檢測
    player.update();
    if (Math.abs(player.body[0].x) > MAP || Math.abs(player.body[0].y) > MAP) player.dead = true;

    // AI 行為、覓食與碰撞邏輯
    ai_bots.forEach(s => {
        // 尋找地圖上的隨機食物前進（簡單AI模擬）
        if (Math.random() > 0.97 && foods.length > 0) {
            let target = foods[Math.floor(Math.random()*foods.length)];
            s.angle = Math.atan2(target.y - s.body[0].y, target.x - s.body[0].x);
        }
        s.update();
        if (Math.abs(s.body[0].x) > MAP || Math.abs(s.body[0].y) > MAP) s.dead = true;
        
        // AI 吃食物判定
        for (let i = foods.length - 1; i >= 0; i--) {
            let f = foods[i];
            let afdx = s.body[0].x - f.x, afdy = s.body[0].y - f.y;
            let adist = Math.sqrt(afdx*afdx + afdy*afdy);
            if (adist < s.getWidth() * 0.6) {
                s.length += f.size * 1.5;
                foods.splice(i, 1);
                spawnFood();
            }
        }

        // AI 撞擊其它蛇身判定
        [player, ...ai_bots].forEach(other => {
            if (other === s || other.dead) return;
            let h = s.body[0];
            let minDist = (s.getWidth() + other.getWidth()) * 0.45;
            // 抽樣檢測身體節點，優化性能
            for (let j = 0; j < other.body.length; j += 10) {
                let odx = h.x - other.body[j].x, ody = h.y - other.body[j].y;
                if (odx*odx + ody*ody < minDist * minDist) s.dead = true;
            }
        });
        if (s.dead) toDie.push(s);
    });

    // 玩家死亡偵測（撞擊 AI 身體）
    ai_bots.forEach(s => {
        let minDist = (player.getWidth() + s.getWidth()) * 0.45;
        for (let j = 0; j < s.body.length; j += 6) {
            let pdx = player.body[0].x - s.body[j].x, pdy = player.body[0].y - s.body[j].y;
            if (pdx*pdx + pdy*pdy < minDist * minDist) player.dead = true;
        }
    });

    // 處理死亡再生與殘留食物
    if (player.dead) { 
        saveRecord(player.length); 
        alert(`遊戲結束！你的最終分數為: ${Math.floor(player.length)}`);
        exitToMenu(); 
        ctx.restore();
        return;
    }

    toDie.forEach(s => {
        let count = Math.min(40, Math.floor(s.length/50));
        for(let k=0; k<count; k++) {
            spawnFood(s.body[0].x+(Math.random()-0.5)*300, s.body[0].y+(Math.random()-0.5)*300, true, s.color);
        }
        let index = ai_bots.indexOf(s);
        if(index > -1) {
            ai_bots.splice(index, 1); 
            spawnAI();
        }
    });
    toDie = [];

    // 渲染所有生物
    ai_bots.forEach(a => a.draw()); 
    player.draw();

    ctx.restore();

    // 更新右側即時排行榜 UI 與底部個人分數
    document.getElementById("score-ui").innerText = `SCORE: ${Math.floor(player.length)}`;
    let ranking = [player, ...ai_bots].sort((a,b)=>b.length - a.length).slice(0, 8);
    document.getElementById("ui-layer").innerHTML = `<b>🏆 ${currentMode.toUpperCase()} RANK</b><hr>` + 
        ranking.map((s,i)=>`<div style="color:${s.isPlayer?'#0f4':'#fff'}">${i+1}. ${s.name} <span style="float:right">${Math.floor(s.length)}</span></div>`).join("");
}

function startGame() {
    let inputName = document.getElementById("player-name-input").value.trim();
    playerName = inputName || "GUEST";
    initGame();
    started = true;
    document.getElementById("menu").style.display = "none";
}

function exitToMenu() {
    started = false;
    document.getElementById("menu").style.display = "flex";
    updatePermanentUI();
}

// 監聽鍵盤與滑鼠事件
window.addEventListener("keydown", e => {
    if (e.key === "Escape") exitToMenu();
});

window.addEventListener("mousemove", e => { 
    mouse.x = e.clientX; 
    mouse.y = e.clientY; 
});
window.addEventListener("mousedown", () => mouse.down = true);
window.addEventListener("mouseup", () => mouse.down = false);

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);

// 初始化執行
resize();
selectMode('evo', 3000);
loop(); // 啟動唯一的全局渲染計時器
</script>
</body>
</html>
